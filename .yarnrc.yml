compressionLevel: mixed

enableGlobalCache: true

nmMode: hardlinks-global

nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.5.1.cjs

# Supply-chain hardening: refuse dependency install lifecycle scripts
# (global ~/.yarnrc.yml gate does not carry into CI). react-table and
# workerize-loader are git deps that build from source; allowlisted via
# dependenciesMeta.built in package.json.
enableScripts: false
