name: Test

on: push

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: league_test
          POSTGRES_PASSWORD: league_test
          POSTGRES_DB: league_test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '18'

      - name: Clean install
        run: |
          rm -rf node_modules
          yarn install --immutable

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Setup PostgreSQL roles
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: league_test
          PGUSER: league_test
          PGPASSWORD: league_test
        run: |
          # Create the roles db/schema.postgres.sql GRANTs to (postgres,
          # league_user, league_readonly) using the same canonical, idempotent
          # init script compose.test.yaml mounts locally — the inline version
          # below only created postgres, so the schema's 315 GRANTs to
          # league_readonly aborted the load with "role does not exist".
          psql -v ON_ERROR_STOP=1 -f db/test/init-roles.sql
          # Ensure league_test role has necessary permissions
          psql -c "GRANT ALL PRIVILEGES ON DATABASE league_test TO league_test;" || true

      - name: yarn test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: league_test
          PGUSER: league_test
          PGPASSWORD: league_test
        run: |
          yarn lint
          yarn test

# Failing beacuse virtual framebuffer not installed
#          yarn build-e2e
#          yarn test-e2e
